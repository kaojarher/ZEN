<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鎖妖荒塚：黑闇仙俠傳奇 (Canvas即時動作版)</title>
    <style>
        :root {
            --bg-color: #0c0d0e;
            --panel-bg: #1a1c1e;
            --text-color: #d1c7bd;
            --accent-color: #cc9933;
            --health-color: #a32a2a;
            --mana-color: #2a6aa3;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Microsoft JhengHei, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            width: 1000px;
            max-width: 100%;
            background-color: var(--panel-bg);
            border: 2px solid #3a352a;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 15px;
        }

        /* 左側：遊戲畫面與控制 */
        .view-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        #gameCanvas {
            background-color: #000;
            border: 2px solid #5a4d3c;
            border-radius: 4px;
            width: 100%;
            aspect-ratio: 4/3;
        }

        /* 虛擬搖桿與UI */
        #joystick-zone {
            position: absolute;
            left: 20px;
            bottom: 80px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: none; /* 手機觸控時自動啟用 */
        }
        #joystick-stick {
            position: absolute;
            left: 40px;
            top: 40px;
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: 50%;
            opacity: 0.8;
        }

        /* 右側：狀態、整備與日誌 */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #111214;
            border: 1px solid #3a352a;
            padding: 15px;
            border-radius: 4px;
            overflow-y: auto;
            max-height: 550px;
        }

        .bar {
            height: 18px;
            background: #333;
            margin-bottom: 5px;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.1s; }
        #hp-fill { background-color: var(--health-color); }
        #mp-fill { background-color: var(--mana-color); }
        .bar-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 11px; line-height: 18px; color: #fff; font-weight: bold;
        }

        button {
            background: linear-gradient(#2a251f, #151310);
            color: #d1c7bd;
            border: 1px solid #5a4d3c;
            padding: 8px 12px;
            margin: 3px 0;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
            width: 100%;
            text-align: left;
        }
        button:hover {
            background: linear-gradient(#3a332a, #25211a);
            border-color: var(--accent-color);
            color: #fff;
        }

        .log-box {
            background: #050505;
            border: 1px solid #222;
            height: 120px;
            overflow-y: auto;
            padding: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
        }
        .log-loot { color: #dfb15b; font-weight: bold; }
        .log-combat { color: #d9534f; }
        
        .town-menu { display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 左側主畫面 -->
    <div class="view-panel">
        <div style="display: flex; justify-content: space-between; color: var(--accent-color); font-weight: bold;">
            <span id="map-title">落霞村 (安全區域)</span>
            <span id="floor-indicator">當前位置: 村莊</span>
        </div>
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        
        <!-- 虛擬搖桿 -->
        <div id="joystick-zone"><div id="joystick-stick"></div></div>
        
        <div style="font-size: 12px; color: #777; text-align: center;">
            電腦：[WASD / 方向鍵] 移動，靠近妖怪自動進行「即時修仙斬擊」
        </div>
    </div>

    <!-- 右側資訊與互動面板 -->
    <div class="side-panel">
        <div>
            <h2 style="color:var(--accent-color); margin:0 0 10px 0; font-size: 18px;">修仙者狀態</h2>
            <p style="margin: 3px 0;"><strong>境界：</strong> <span id="char-level">練氣期第一層</span></p>
            <p style="margin: 3px 0;"><strong>靈石：</strong> <span id="char-gold" style="color:#dfb15b;">100</span> 兩</p>
            <div class="bar"><div id="hp-fill" class="bar-fill"></div><div id="bar-hp-text" class="bar-text">100/100</div></div>
            <div class="bar"><div id="mp-fill" class="bar-fill"></div><div id="bar-mp-text" class="bar-text">50/50</div></div>
            <p style="margin: 3px 0; font-size:13px;"><strong>法寶：</strong> <span id="char-weapon" style="color:#dfb15b;">木劍 (+0)</span></p>
        </div>

        <hr style="border-color: #3a352a; width: 100%; margin: 5px 0;">

        <!-- 村莊NPC互動選單 -->
        <div id="town-controls" class="town-menu">
            <h3 style="margin: 0; font-size: 14px; color: var(--accent-color);">⛩️ 土地公廟 & 村落整備</h3>
            <button onclick="interactNPC('temple')">🙏 拜會廟祝 (回復/買丹藥/祝福)</button>
            <button onclick="interactNPC('blacksmith')">⚒️ 尋找鐵匠阿海 (強化法寶)</button>
            <button onclick="interactNPC('witch')">🔮 盲眼法師神婆 (鑑定古物)</button>
        </div>
        
        <!-- 隨機支線任務 -->
        <div id="quest-panel" style="background: #181512; padding: 8px; border: 1px solid #443a2e; font-size: 13px;">
            <span style="color: #cc9933; font-weight: bold;">📜 當前村落異聞：</span>
            <div id="quest-text">暫無任務，去洞窟探險吧。</div>
        </div>

        <div>
            <h3 style="margin: 0 0 5px 0; font-size: 13px; color: #888;">修煉日誌</h3>
            <div id="log" class="log-box"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 遊戲核心資料狀態 ---
    const player = {
        x: 100, y: 100, size: 14, speed: 4,
        level: 1, hp: 100, maxHp: 100, mp: 50, maxMp: 50,
        gold: 150, blessing: false, unidentifedItems: 0,
        weapon: { name: "木劍", atkBonus: 0, identified: true }
    };

    let currentMap = "town"; // "town" 或 "cave"
    let caveFloor = 0;
    let grid = []; // 地圖陣列 0:空地, 1:牆壁, 2:傳送門(洞窟入口/下一層)
    const tileSize = 32;
    const mapWidth = 20;
    const mapHeight = 15;

    let monsters = [];
    let logs = [];
    let activeQuest = { name: "尚未觸發", desc: "深入鎖妖洞即有機會觸發隨機村落異聞。" };

    // 隨機詞綴資料庫
    const prefixes = ["純陽之", "玄冰之", "喋血的", "寂滅的", "殘暴的"];
    const baseWeapons = ["桃木劍", "精鐵劍", "八卦鏡", "玄鐵重劍"];
    const suffixes = ["之迅雷", "之破甲", "之弒妖", "之長生"];

    // 怪物模組
    const monsterNames = ["穴居枯骨", "雙瞳怨鬼", "嗜血蛛精", "赤煉毒蛇", "洞窟飛頭蠻"];

    // 鍵盤輸入監聽
    const keys = {};
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

    // --- 隨機地圖生成 (Roguelike 簡易版) ---
    function generateMap(type) {
        grid = [];
        for (let y = 0; y < mapHeight; y++) {
            grid[y] = [];
            for (let x = 0; x < mapWidth; x++) {
                // 邊界必定為牆
                if (x === 0 || x === mapWidth - 1 || y === 0 || y === mapHeight - 1) {
                    grid[y][x] = 1;
                } else {
                    grid[y][x] = 0;
                }
            }
        }

        if (type === "town") {
            // 建造土地公廟牆壁與後方通道
            for(let i=5; i<=14; i++) grid[5][i] = 1; 
            grid[5][9] = 0; // 廟門
            grid[2][9] = 2; // 廟後山洞入口
            player.x = 100; player.y = 350;
            monsters = [];
            document.getElementById("map-title").innerText = "落霞村 (安全區域)";
            document.getElementById("floor-indicator").innerText = "當前位置: 村莊";
            document.getElementById("town-controls").style.display = "block";
        } else {
            // 鎖妖洞：隨機放置內部障礙物牆壁 (重現暗黑1迷宮感)
            for (let y = 2; y < mapHeight - 2; y++) {
                for (let x = 2; x < mapWidth - 2; x++) {
                    if (Math.random() < 0.18) grid[y][x] = 1;
                }
            }
            // 確保起點通暢
            player.x = tileSize * 2; player.y = tileSize * 2;
            grid[2][2] = 0; grid[2][3] = 0; grid[3][2] = 0;

            // 隨機放置前往下一層的傳送石階
            let tx = Math.floor(Math.random() * 10) + 8;
            let ty = Math.floor(Math.random() * 8) + 5;
            grid[ty][tx] = 2;

            document.getElementById("map-title").innerText = `鎖妖洞窟 - 第 ${caveFloor} 層`;
            document.getElementById("floor-indicator").innerText = `危險區域 (第 ${caveFloor} 層)`;
            document.getElementById("town-controls").style.display = "none";

            // 生成隨機移動的妖怪
            spawnMonsters();
            
            // 隨機觸發暗黑1特色支線任務
            if (Math.random() < 0.3 && activeQuest.name === "尚未觸發") {
                triggerRandomQuest();
            }
        }
    }

    // 生成妖怪並給予隨機巡邏AI
    function spawnMonsters() {
        monsters = [];
        let count = 4 + caveFloor; // 層數越深怪越多
        for (let i = 0; i < count; i++) {
            let rx, ry;
            do {
                rx = Math.floor(Math.random() * (mapWidth - 4)) + 2;
                ry = Math.floor(Math.random() * (mapHeight - 4)) + 2;
            } while (grid[ry][rx] !== 0 || (rx < 5 && ry < 5));

            monsters.push({
                x: rx * tileSize + tileSize/2,
                y: ry * tileSize + tileSize/2,
                name: monsterNames[Math.floor(Math.random() * monsterNames.length)],
                hp: 20 + caveFloor * 15,
                maxHp: 20 + caveFloor * 15,
                atk: 3 + caveFloor * 2,
                speed: 1 + Math.random() * 1,
                dirX: Math.random() > 0.5 ? 1 : -1,
                dirY: Math.random() > 0.5 ? 1 : -1,
                changeDirTimer: 0
            });
        }
    }

    function triggerRandomQuest() {
        const quests = [
            { name: "李員外之怨", desc: "傳聞村裡李員外死後化為【骷髏王】就在此層，將其斬殺可得古物！" },
            { name: "飲血水怪", desc: "土地公提及洞中有水怪肆虐（如同屠夫），請務必小心牠的偷襲！" }
        ];
        activeQuest = quests[Math.floor(Math.random() * quests.length)];
        addLog(`📜 觸發村落異聞任務：【${activeQuest.name}】！`, "loot");
        document.getElementById("quest-text").innerText = `${activeQuest.name}: ${activeQuest.desc}`;
        
        // 特殊任務怪強化
        if(monsters.length > 0) {
            monsters[0].name = `【妖首】${activeQuest.name === "李員外之怨" ? "發狂的骷髏王" : "飲血水怪"}`;
            monsters[0].hp *= 2.5;
            monsters[0].atk *= 1.5;
        }
    }

    // --- 碰撞偵測機制 ---
    function checkCollision(x, y) {
        let tileX = Math.floor(x / tileSize);
        let tileY = Math.floor(y / tileSize);
        if (tileX < 0 || tileX >= mapWidth || tileY < 0 || tileY >= mapHeight) return 1;
        return grid[tileY][tileX];
    }

    // --- 遊戲邏輯與即時戰鬥演算 ---
    function update() {
        let dx = 0; let dy = 0;
        if (keys['w'] || keys['arrowup']) dy = -player.speed;
        if (keys['s'] || keys['arrowdown']) dy = player.speed;
        if (keys['a'] || keys['arrowleft']) dx = -player.speed;
        if (keys['d'] || keys['arrowright']) dx = player.speed;

        // 斜向移動速度修正
        if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

        // 移動並偵測地圖牆壁碰撞
        if (checkCollision(player.x + dx, player.y) === 0 || checkCollision(player.x + dx, player.y) === 2) player.x += dx;
        if (checkCollision(player.x, player.y + dy) === 0 || checkCollision(player.x, player.y + dy) === 2) player.y += dy;

        // 偵測是否踩到傳送點/洞窟石階 (Grid === 2)
        let currentTile = checkCollision(player.x, player.y);
        if (currentTile === 2) {
            if (currentMap === "town") {
                currentMap = "cave"; caveFloor = 1;
                addLog("⚔️ 你跨過土地廟後方禁制，進入鎖妖洞第一層！", "combat");
                generateMap("cave");
            } else {
                caveFloor++;
                addLog(`🚪 你順著石階深入到鎖妖洞第 ${caveFloor} 層。`, "system");
                generateMap("cave");
            }
            return;
        }

        // --- 妖怪 AI 移動與即時戰鬥 (靠近即自動互砍，重現暗黑1流暢刷怪) ---
        for (let i = monsters.length - 1; i >= 0; i--) {
            let m = monsters[i];
            
            // 隨機巡邏與牆壁反彈 AI
            m.changeDirTimer++;
            if (m.changeDirTimer > 60) {
                if (Math.random() < 0.3) { m.dirX = Math.floor(Math.random() * 3) - 1; m.dirY = Math.floor(Math.random() * 3) - 1; }
                m.changeDirTimer = 0;
            }
            let nextMx = m.x + m.dirX * m.speed;
            let nextMy = m.y + m.dirY * m.speed;
            if (checkCollision(nextMx, m.y) === 0) m.x = nextMx; else m.dirX *= -1;
            if (checkCollision(m.x, nextMy) === 0) m.y = nextMy; else m.dirY *= -1;

            // 計算與修仙者的距離
            let dist = Math.hypot(player.x - m.x, player.y - m.y);
            if (dist < 22) { // 進入白刃戰範圍
                // 1. 玩家斬擊妖怪
                let playerAtk = 5 + player.level * 2 + player.weapon.atkBonus;
                m.hp -= 0.5; // 每影格造成持續物理斬擊
                
                // 2. 妖怪撕咬玩家
                player.hp -= (m.atk * 0.03); 

                if (m.hp <= 0) {
                    // 妖怪死亡，爆落戰利品
                    let goldLoot = Math.floor(Math.random() * 20) + caveFloor * 5;
                    player.gold += goldLoot;
                    addLog(`💥 斬殺【${m.name}】！奪得靈石 ${goldLoot} 兩。`, "loot");

                    // 40% 機率爆出未鑑定法寶 (暗黑1經典特色)
                    if (Math.random() < 0.4) {
                        player.unidentifedItems++;
                        addLog(`✨ 妖祟身上掉落一件【未鑑定的古物法寶】！請回村找神婆鑑定。`, "loot");
                    }

                    // 檢查是否完成支線任務
                    if (m.name.includes("【妖首】")) {
                        let questReward = caveFloor * 100;
                        player.gold += questReward;
                        addLog(`🎉 完成村落異聞【${activeQuest.name}】！獲得村長賞金 ${questReward} 兩！`, "loot");
                        activeQuest = { name: "尚未觸發", desc: "深入鎖妖洞即有機會觸發隨機村落異聞。" };
                        document.getElementById("quest-text").innerText = "暫無任務，去洞窟探險吧。";
                    }

                    monsters.splice(i, 1);
                }

                if (player.hp <= 0) {
                    handleDeath();
                }
            }
        }
    }

    // --- 繪製畫面 (Canvas Render) ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 繪製地圖地形
        for (let y = 0; y < mapHeight; y++) {
            for (let x = 0; x < mapWidth; x++) {
                if (grid[y][x] === 1) {
                    ctx.fillStyle = "#3a352a"; // 牆壁：古磚色
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize - 1, tileSize - 1);
                } else if (grid[y][x] === 2) {
                    ctx.fillStyle = currentMap === "town" ? "#a32a2a" : "#cc9933"; // 傳送門/石階顏色
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                    ctx.fillStyle = "#fff";
                    ctx.font = "10px sans-serif";
                    ctx.fillText(currentMap === "town" ? "入洞" : "下層", x * tileSize + 4, y * tileSize + 18);
                } else {
                    ctx.fillStyle = "#111214"; // 空地：黑闇路面
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }
        }

        // 2. 繪製土地公廟特殊建築物 (僅在村莊呈現)
        if (currentMap === "town") {
            ctx.fillStyle = "#cc9933";
            ctx.font = "16px sans-serif";
            ctx.fillText("⛩️ 土地公廟", 9 * tileSize - 20, 4 * tileSize);
        }

        // 3. 繪製妖怪
        monsters.forEach(m => {
            ctx.beginPath();
            ctx.arc(m.x, m.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = m.name.includes("【妖首】") ? "#ff3333" : "#a32a2a"; // 任務怪更紅更大
            ctx.fill();
            
            // 怪物血條
            ctx.fillStyle = "red";
            ctx.fillRect(m.x - 12, m.y - 18, 24, 3);
            ctx.fillStyle = "green";
            ctx.fillRect(m.x - 12, m.y - 18, (m.hp / m.maxHp) * 24, 3);
        });

        // 4. 繪製修仙者角色 (具有暗黑1燈光範圍視角半徑效果)
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
        ctx.fillStyle = player.blessing ? "#6be86b" : "#4ba3a5"; // 獲得土地公祝福會發綠光
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.stroke();

        // 5. 更新右側網頁純文字狀態欄
        document.getElementById("hp-fill").style.width = `${Math.max(0, (player.hp / player.maxHp) * 100)}%`;
        document.getElementById("bar-hp-text").innerText = `${Math.floor(player.hp)}/${player.maxHp} HP`;
        document.getElementById("char-gold").innerText = player.gold;
        document.getElementById("char-weapon").innerText = `${player.weapon.name} (傷害加成 +${player.weapon.atkBonus})`;
    }

    // --- 基地城鎮 NPC 互動功能功能 ---
    function interactNPC(npc) {
        if (currentMap !== "town") {
            addLog("❌ 你正身處險境，必須先返回落霞村才能拜會NPC！", "system");
            return;
        }

        if (npc === "temple") {
            // 土地公廟祝
            let choice = prompt("【土地公廟祝】:「少俠需要什麼？」\n1. 飲用聖水回復氣血 (免費)\n2. 購買化清聚靈丹 (50兩)\n3. 祈求土地公神光加持祝福 (100兩)");
            if (choice === "1") {
                player.hp = player.maxHp; player.mp = player.maxMp;
                addLog("🙏 廟祝為你上香點露，氣血與靈力完全恢復！", "system");
            } else if (choice === "2") {
                if (player.gold >= 50) { player.gold -= 50; player.maxMp += 10; player.mp = player.maxMp; addLog("🧪 服下聚靈丹，最大靈力上限永久提升 10 點！", "loot"); }
                else addLog("❌ 靈石不足！", "system");
            } else if (choice === "3") {
                if (player.gold >= 100 && !player.blessing) {
                    player.gold -= 100; player.blessing = true; player.weapon.atkBonus += 5;
                    addLog("✨ 土地公顯靈！神光照體，法寶鋒芒暴漲，傷害永久+5！", "loot");
                } else addLog("❌ 靈石不足或已獲得祝福。", "system");
            }
        } 
        else if (npc === "blacksmith") {
            // 鐵匠阿海
            if (player.gold >= 80) {
                player.gold -= 80;
                player.weapon.atkBonus += 3;
                addLog(`⚒️ 鐵匠阿海揮舞重錘，幫你的【${player.weapon.name}】淬火鎔鑄！傷害加成提升 3 點！`, "loot");
            } else {
                addLog("❌ 鐵匠阿海斜眼看你：「淬火需要 80 兩靈石，你身上不夠啊！」", "system");
            }
        } 
        else if (npc === "witch") {
            // 神婆鑑定
            if (player.unidentifedItems <= 0) {
                addLog("🔮 神婆摸了摸盲眼說：「你身上沒有自山洞帶出來的未鑑定古物。」", "system");
                return;
            }
            if (player.gold < 40) {
                addLog("❌ 鑑定需要 40 兩靈石秘法費用。", "system");
                return;
            }

            player.gold -= 40;
            player.unidentifedItems--;
            
            // 隨機爆出神兵利器 (完全重現暗黑1前後綴組合)
            let pf = prefixes[Math.floor(Math.random() * prefixes.length)];
            let sf = suffixes[Math.floor(Math.random() * suffixes.length)];
            let base = baseWeapons[Math.floor(Math.random() * baseWeapons.length)];
            let atk = Math.floor(Math.random() * 10) + caveFloor * 4;

            player.weapon = { name: `${pf}${base}${sf}`, atkBonus: atk, identified: true };
            addLog(`🔮 神婆開啟天眼，鑑定出曠世神兵：【${player.weapon.name}】(傷害暴增 +${atk})！已自動裝備。`, "loot");
        }
    }

    function handleDeath() {
        addLog("☠️ 你力戰不支，倒在血泊中……被廟祝用回魂咒救回村莊。", "combat");
        player.hp = player.maxHp * 0.4;
        currentMap = "town";
        caveFloor = 0;
        // 死亡懲罰：噴掉未鑑定物品
        player.unidentifedItems = 0;
        generateMap("town");
    }

    function addLog(msg, type = "system") {
        const logBox = document.getElementById("log");
        const div = document.createElement("div");
        div.className = `log-${type}`;
        div.innerText = msg;
        logBox.appendChild(div);
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- 手機虛擬搖桿支援 (Touch Events) ---
    const joystick = document.getElementById("joystick-zone");
    const stick = document.getElementById("joystick-stick");
    let joystickActive = false; let jsStartX = 0; let jsStartY = 0;

    window.addEventListener("touchstart", e => {
        if (e.touches[0].clientX < window.innerWidth / 2) {
            joystick.style.display = "block";
            joystick.style.left = `${e.touches[0].clientX - 60}px`;
            joystick.style.bottom = `${window.innerHeight - e.touches[0].clientY - 60}px`;
            jsStartX = e.touches[0].clientX; jsStartY = e.touches[0].clientY;
            joystickActive = true;
        }
    });

    window.addEventListener("touchmove", e => {
        if (!joystickActive) return;
        let tX = e.touches[0].clientX; let tY = e.touches[0].clientY;
        let rad = Math.atan2(tY - jsStartY, tX - jsStartX);
        let dist = Math.min(40, Math.hypot(tX - jsStartX, tY - jsStartY));
        
        stick.style.left = `${40 + Math.cos(rad) * dist}px`;
        stick.style.top = `${40 + Math.sin(rad) * dist}px`;

        // 將搖桿角度轉為鍵盤虛擬訊號
        keys['w'] = Math.sin(rad) < -0.4;
        keys['s'] = Math.sin(rad) > 0.4;
        keys['a'] = Math.cos(rad) < -0.4;
        keys['d'] = Math.cos(rad) > 0.4;
    });

    window.addEventListener("touchend", () => {
        joystickActive = false;
        joystick.style.display = "none";
        stick.style.left = "40px"; stick.style.top = "40px";
        keys['w'] = false; keys['s'] = false; keys['a'] = false; keys['d'] = false;
    });

    // --- 遊戲主迴圈 (Main Loop) ---
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // 啟動
    generateMap("town");
    gameLoop();
</script>

</body>
</html>
